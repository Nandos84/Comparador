<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Comparator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html@3.4.46/bundles/css/diff2html.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html-ui@3.4.46/dist/diff2html-ui.min.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
            margin: 10px 0;
            padding: 10px;
            font-family: monospace;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #diff-viewer {
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <h1>Text Comparator</h1>
    <p>Paste two texts below and click <strong>Compare</strong> to see the differences highlighted.</p>
    <textarea id="original" placeholder="Original text..."></textarea>
    <textarea id="modified" placeholder="Modified text..."></textarea>
    <button onclick="compareTexts()">Compare</button>
    <div id="diff-viewer"></div>

    <script src="https://cdn.jsdelivr.net/npm/diff2html@3.4.46/bundles/js/diff2html-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/diff2html@3.4.46/bundles/js/diff2html.min.js"></script>
    <script>
        function compareTexts() {
            const original = document.getElementById('original').value;
            const modified = document.getElementById('modified').value;
            if (!original && !modified) {
                document.getElementById('diff-viewer').innerHTML = '<p>No text provided.</p>';
                return;
            }
            const diffString = Diff2Html.htmlDiff(original, modified, {
                drawFileList: false,
                matching: 'lines',
                outputFormat: 'side-by-side'
            });
            document.getElementById('diff-viewer').innerHTML = diffString;
            // Initialize Diff2HtmlUI for better interaction
            const diff2htmlUi = new Diff2HtmlUI('#diff-viewer', undefined, Diff2HtmlUi.defaultConfig);
            diff2htmlUi.highlightCode('#diff-viewer');
        }
    </script>
</body>
</html>
